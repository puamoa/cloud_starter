AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Step 6-2 RDS Rotation Lab Prerequisites.
  Creates VPC, Subnets (4), IGW, Route Tables, Security Groups, DB Subnet Group, and RDS MySQL instance.
  VPC Endpoint for Secrets Manager is created in the lab (manual step).

# =============================================================================
# Metadata - CloudFormation 콘솔에서 파라미터 입력 화면의 그룹과 순서를 지정
# =============================================================================
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: 'Required Settings (Check Before Create)'
        Parameters:
          - ProjectName
          - DBMasterUsername
          - DBMasterPassword
          - DBName
      - Label:
          default: 'Network CIDR (Keep Default)'
        Parameters:
          - VpcCidr
          - PublicSubnetACidr
          - PublicSubnetCCidr
          - PrivateSubnetACidr
          - PrivateSubnetCCidr
      - Label:
          default: 'RDS Settings (Keep Default)'
        Parameters:
          - DBInstanceClass
          - DBAllocatedStorage
      - Label:
          default: 'Tags (Keep Default)'
        Parameters:
          - CreatedByTag
          - StepTag
          - SessionTag

# =============================================================================
# Parameters - 스택 생성 시 사용자 입력값
# =============================================================================
Parameters:
  ProjectName:
    Type: String
    Default: starter
    Description: Resource name prefix (e.g. starter -> starter-vpc, starter-rds)
    AllowedPattern: '[a-zA-Z][a-zA-Z0-9-]*'
    ConstraintDescription: Must start with a letter, only letters, numbers, and hyphens allowed
    MinLength: 1
    MaxLength: 20

  # --- DB 설정 (Secrets Manager에 저장한 값과 일치시키세요) ---
  DBMasterUsername:
    Type: String
    Default: admin
    Description: RDS master username (Secrets Manager 'username' value)
    MinLength: 1
    MaxLength: 16

  DBMasterPassword:
    Type: String
    Default: MyPassword123!
    Description: RDS master password (Secrets Manager 'password' value)
    NoEcho: true
    MinLength: 8
    MaxLength: 41

  DBName:
    Type: String
    Default: starter_db
    Description: Initial database name (Secrets Manager 'dbname' value)
    AllowedPattern: '[a-zA-Z][a-zA-Z0-9_]*'
    MinLength: 1
    MaxLength: 64

  # --- 네트워크 설정 ---
  VpcCidr:
    Type: String
    Default: '10.0.0.0/16'
    Description: VPC CIDR block

  PublicSubnetACidr:
    Type: String
    Default: '10.0.1.0/24'
    Description: Public Subnet A CIDR (ap-northeast-2a)

  PublicSubnetCCidr:
    Type: String
    Default: '10.0.2.0/24'
    Description: Public Subnet C CIDR (ap-northeast-2c)

  PrivateSubnetACidr:
    Type: String
    Default: '10.0.11.0/24'
    Description: Private Subnet A CIDR (ap-northeast-2a)

  PrivateSubnetCCidr:
    Type: String
    Default: '10.0.12.0/24'
    Description: Private Subnet C CIDR (ap-northeast-2c)

  # --- RDS 설정 ---
  DBInstanceClass:
    Type: String
    Default: db.t3.micro
    Description: RDS instance type
    AllowedValues:
      - db.t3.micro
      - db.t3.small
      - db.t4g.micro

  DBAllocatedStorage:
    Type: Number
    Default: 20
    Description: RDS storage size (GB)
    MinValue: 20
    MaxValue: 100

  # --- 태그 ---
  CreatedByTag:
    Type: String
    Default: cloudformation
    Description: CreatedBy tag value

  StepTag:
    Type: String
    Default: step6
    Description: Step tag value

  SessionTag:
    Type: String
    Default: '6-2'
    Description: Session tag value

# =============================================================================
# Resources - 생성할 AWS 리소스
# =============================================================================
Resources:
  # ---------------------------------------------------------------------------
  # VPC
  # ---------------------------------------------------------------------------
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-vpc'
        - Key: CreatedBy
          Value: !Ref CreatedByTag
        - Key: Step
          Value: !Ref StepTag
        - Key: Session
          Value: !Ref SessionTag

  # ---------------------------------------------------------------------------
  # Internet Gateway
  # ---------------------------------------------------------------------------
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-igw'
        - Key: CreatedBy
          Value: !Ref CreatedByTag
        - Key: Step
          Value: !Ref StepTag
        - Key: Session
          Value: !Ref SessionTag

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  # ---------------------------------------------------------------------------
  # Subnets - 퍼블릭 2개 + 프라이빗 2개 (2 AZ)
  # ---------------------------------------------------------------------------
  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnetACidr
      AvailabilityZone: ap-northeast-2a
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-public-subnet-a'
        - Key: CreatedBy
          Value: !Ref CreatedByTag
        - Key: Step
          Value: !Ref StepTag
        - Key: Session
          Value: !Ref SessionTag

  PublicSubnetC:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnetCCidr
      AvailabilityZone: ap-northeast-2c
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-public-subnet-c'
        - Key: CreatedBy
          Value: !Ref CreatedByTag
        - Key: Step
          Value: !Ref StepTag
        - Key: Session
          Value: !Ref SessionTag

  PrivateSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnetACidr
      AvailabilityZone: ap-northeast-2a
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-private-subnet-a'
        - Key: CreatedBy
          Value: !Ref CreatedByTag
        - Key: Step
          Value: !Ref StepTag
        - Key: Session
          Value: !Ref SessionTag

  PrivateSubnetC:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnetCCidr
      AvailabilityZone: ap-northeast-2c
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-private-subnet-c'
        - Key: CreatedBy
          Value: !Ref CreatedByTag
        - Key: Step
          Value: !Ref StepTag
        - Key: Session
          Value: !Ref SessionTag

  # ---------------------------------------------------------------------------
  # Route Tables - 퍼블릭 라우트 테이블 (프라이빗은 기본 로컬 라우트만)
  # ---------------------------------------------------------------------------
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-public-rt'
        - Key: CreatedBy
          Value: !Ref CreatedByTag
        - Key: Step
          Value: !Ref StepTag
        - Key: Session
          Value: !Ref SessionTag

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetA
      RouteTableId: !Ref PublicRouteTable

  PublicSubnetCRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetC
      RouteTableId: !Ref PublicRouteTable

  # ---------------------------------------------------------------------------
  # Security Groups
  # ---------------------------------------------------------------------------

  # RDS 보안 그룹 - VPC 내부에서만 MySQL 접근 허용
  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${ProjectName}-rds-sg'
      GroupDescription: !Sub '${ProjectName} - Security group for RDS (MySQL 3306 from VPC)'
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: !Ref VpcCidr
          Description: MySQL from VPC internal
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-rds-sg'
        - Key: CreatedBy
          Value: !Ref CreatedByTag
        - Key: Step
          Value: !Ref StepTag
        - Key: Session
          Value: !Ref SessionTag

  # Lambda 로테이션 함수용 보안 그룹
  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${ProjectName}-lambda-sg'
      GroupDescription: !Sub '${ProjectName} - Security group for Lambda rotation function'
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: !Ref VpcCidr
          Description: HTTPS from VPC (for VPC Endpoint access)
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-lambda-sg'
        - Key: CreatedBy
          Value: !Ref CreatedByTag
        - Key: Step
          Value: !Ref StepTag
        - Key: Session
          Value: !Ref SessionTag

  # RDS SG에 Lambda SG로부터의 인바운드 추가
  RDSFromLambdaIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref RDSSecurityGroup
      IpProtocol: tcp
      FromPort: 3306
      ToPort: 3306
      SourceSecurityGroupId: !Ref LambdaSecurityGroup
      Description: MySQL from Lambda rotation function

  # ---------------------------------------------------------------------------
  # DB Subnet Group - RDS가 배치될 프라이빗 서브넷 그룹
  # ---------------------------------------------------------------------------
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupName: !Sub '${ProjectName}-db-subnet-group'
      DBSubnetGroupDescription: !Sub '${ProjectName} - Private subnets for RDS'
      SubnetIds:
        - !Ref PrivateSubnetA
        - !Ref PrivateSubnetC
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-db-subnet-group'
        - Key: CreatedBy
          Value: !Ref CreatedByTag
        - Key: Step
          Value: !Ref StepTag
        - Key: Session
          Value: !Ref SessionTag

  # ---------------------------------------------------------------------------
  # RDS MySQL 인스턴스
  # ---------------------------------------------------------------------------
  RDSInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Delete
    Properties:
      DBInstanceIdentifier: !Sub '${ProjectName}-mysql'
      DBInstanceClass: !Ref DBInstanceClass
      Engine: mysql
      EngineVersion: '8.0'
      MasterUsername: !Ref DBMasterUsername
      MasterUserPassword: !Ref DBMasterPassword
      DBName: !Ref DBName
      AllocatedStorage: !Ref DBAllocatedStorage
      StorageType: gp3
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !Ref RDSSecurityGroup
      PubliclyAccessible: false
      MultiAZ: false
      BackupRetentionPeriod: 0
      DeletionProtection: false
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-mysql'
        - Key: CreatedBy
          Value: !Ref CreatedByTag
        - Key: Step
          Value: !Ref StepTag
        - Key: Session
          Value: !Ref SessionTag

# =============================================================================
# Outputs - 생성된 리소스 정보 출력
# =============================================================================
Outputs:
  VPCId:
    Description: VPC ID
    Value: !Ref VPC
    Export:
      Name: !Sub '${AWS::StackName}-VPCId'

  PrivateSubnetAId:
    Description: Private Subnet A ID (for VPC Endpoint)
    Value: !Ref PrivateSubnetA
    Export:
      Name: !Sub '${AWS::StackName}-PrivateSubnetAId'

  PrivateSubnetCId:
    Description: Private Subnet C ID (for VPC Endpoint)
    Value: !Ref PrivateSubnetC
    Export:
      Name: !Sub '${AWS::StackName}-PrivateSubnetCId'

  RDSEndpoint:
    Description: RDS MySQL endpoint (use as 'host' in Secrets Manager)
    Value: !GetAtt RDSInstance.Endpoint.Address
    Export:
      Name: !Sub '${AWS::StackName}-RDSEndpoint'

  RDSPort:
    Description: RDS MySQL port
    Value: !GetAtt RDSInstance.Endpoint.Port

  DBName:
    Description: Database name
    Value: !Ref DBName

  RDSSecurityGroupId:
    Description: RDS Security Group ID
    Value: !Ref RDSSecurityGroup
    Export:
      Name: !Sub '${AWS::StackName}-RDSSecurityGroupId'

  LambdaSecurityGroupId:
    Description: Lambda Security Group ID (for rotation function)
    Value: !Ref LambdaSecurityGroup
    Export:
      Name: !Sub '${AWS::StackName}-LambdaSecurityGroupId'
