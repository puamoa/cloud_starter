AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Step 7-3 Auto Scaling Lab Prerequisites.
  Creates VPC, Public/Private Subnets (2 AZs), IGW, Route Table, ALB, Target Group, Security Groups.

# =============================================================================
# Metadata - CloudFormation 콘솔에서 파라미터 입력 화면의 그룹과 순서를 지정합니다.
# =============================================================================
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: 'Required Settings (Check Before Create)'
        Parameters:
          - ProjectName
          - KeyPairName
          - AppPort
          - SSHAccessCidr
      - Label:
          default: 'Network CIDR (Keep Default)'
        Parameters:
          - VpcCidr
          - PublicSubnetACidr
          - PublicSubnetCCidr
          - PrivateSubnetACidr
          - PrivateSubnetCCidr
      - Label:
          default: 'Tags (Keep Default)'
        Parameters:
          - CreatedByTag
          - StepTag
          - SessionTag

# =============================================================================
# Parameters - 스택 생성 시 사용자가 입력하거나 기본값을 사용할 수 있는 파라미터입니다.
# =============================================================================
Parameters:
  # 리소스 이름 접두사 (예: asg-lab -> asg-lab-vpc, asg-lab-alb)
  ProjectName:
    Type: String
    Default: asg-lab
    Description: Resource name prefix
    AllowedPattern: '[a-zA-Z][a-zA-Z0-9-]*'
    ConstraintDescription: Must start with a letter, only letters, numbers, and hyphens allowed
    MinLength: 1
    MaxLength: 20

  # EC2에 SSH 접속할 때 사용할 기존 Key Pair 이름
  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Name of an existing EC2 Key Pair for SSH access

  # EC2에서 애플리케이션이 실행되는 포트
  # 이 실습에서는 Nginx를 사용하므로 80이 기본값입니다.
  AppPort:
    Type: Number
    Default: 80
    Description: Application port (Nginx default=80)
    AllowedValues:
      - 80
      - 8080

  # SSH 접근을 허용할 IP 대역. 보안을 위해 본인 IP로 제한하는 것을 권장합니다.
  SSHAccessCidr:
    Type: String
    Default: '0.0.0.0/0'
    Description: SSH(22) access CIDR. Restrict to your IP recommended (e.g. 203.0.113.50/32)

  # VPC CIDR 블록
  VpcCidr:
    Type: String
    Default: '10.0.0.0/16'
    Description: VPC CIDR block

  # Public Subnet A (ap-northeast-2a) CIDR
  PublicSubnetACidr:
    Type: String
    Default: '10.0.1.0/24'
    Description: Public Subnet A CIDR (ap-northeast-2a)

  # Public Subnet C (ap-northeast-2c) CIDR
  PublicSubnetCCidr:
    Type: String
    Default: '10.0.2.0/24'
    Description: Public Subnet C CIDR (ap-northeast-2c)

  # Private Subnet A (ap-northeast-2a) CIDR
  PrivateSubnetACidr:
    Type: String
    Default: '10.0.11.0/24'
    Description: Private Subnet A CIDR (ap-northeast-2a)

  # Private Subnet C (ap-northeast-2c) CIDR
  PrivateSubnetCCidr:
    Type: String
    Default: '10.0.12.0/24'
    Description: Private Subnet C CIDR (ap-northeast-2c)

  # 태그 값들
  CreatedByTag:
    Type: String
    Default: cloudformation
    Description: CreatedBy tag value

  StepTag:
    Type: String
    Default: step7
    Description: Step tag value

  SessionTag:
    Type: String
    Default: '7-3'
    Description: Session tag value

# =============================================================================
# Resources - 생성할 AWS 리소스
# 이 스택은 ALB까지 포함합니다. Auto Scaling Group은 실습에서 수동 생성합니다.
# =============================================================================
Resources:
  # ---------------------------------------------------------------------------
  # VPC - 실습용 가상 네트워크. 모든 리소스가 이 VPC 안에 생성됩니다.
  # ---------------------------------------------------------------------------
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-vpc'
        - Key: CreatedBy
          Value: !Ref CreatedByTag
        - Key: Step
          Value: !Ref StepTag
        - Key: Session
          Value: !Ref SessionTag

  # ---------------------------------------------------------------------------
  # Internet Gateway - VPC가 인터넷과 통신하기 위한 관문입니다.
  # ---------------------------------------------------------------------------
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-igw'
        - Key: CreatedBy
          Value: !Ref CreatedByTag
        - Key: Step
          Value: !Ref StepTag
        - Key: Session
          Value: !Ref SessionTag

  # IGW를 VPC에 연결합니다.
  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  # ---------------------------------------------------------------------------
  # Public Subnet 1 (AZ-a) - ALB와 EC2가 배치됩니다.
  # MapPublicIpOnLaunch: true → 이 서브넷에 생성된 EC2에 자동으로 Public IP 부여
  # ---------------------------------------------------------------------------
  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnetACidr
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-public-subnet-1'
        - Key: CreatedBy
          Value: !Ref CreatedByTag
        - Key: Step
          Value: !Ref StepTag
        - Key: Session
          Value: !Ref SessionTag

  # ---------------------------------------------------------------------------
  # Public Subnet 2 (AZ-c) - ALB는 최소 2개 AZ에 배치해야 합니다.
  # ---------------------------------------------------------------------------
  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnetCCidr
      AvailabilityZone: !Select [2, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-public-subnet-2'
        - Key: CreatedBy
          Value: !Ref CreatedByTag
        - Key: Step
          Value: !Ref StepTag
        - Key: Session
          Value: !Ref SessionTag

  # ---------------------------------------------------------------------------
  # Private Subnet 1 (AZ-a) - 향후 RDS 등 내부 리소스 배치용
  # ---------------------------------------------------------------------------
  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnetACidr
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-private-subnet-1'
        - Key: CreatedBy
          Value: !Ref CreatedByTag
        - Key: Step
          Value: !Ref StepTag
        - Key: Session
          Value: !Ref SessionTag

  # ---------------------------------------------------------------------------
  # Private Subnet 2 (AZ-c) - Multi-AZ 구성을 위한 두 번째 Private Subnet
  # ---------------------------------------------------------------------------
  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnetCCidr
      AvailabilityZone: !Select [2, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-private-subnet-2'
        - Key: CreatedBy
          Value: !Ref CreatedByTag
        - Key: Step
          Value: !Ref StepTag
        - Key: Session
          Value: !Ref SessionTag

  # ---------------------------------------------------------------------------
  # Route Table - 서브넷의 트래픽 경로를 정의합니다.
  # 0.0.0.0/0 → IGW 규칙을 추가하여 인터넷으로 나갈 수 있게 합니다.
  # ---------------------------------------------------------------------------
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-public-rt'
        - Key: CreatedBy
          Value: !Ref CreatedByTag
        - Key: Step
          Value: !Ref StepTag
        - Key: Session
          Value: !Ref SessionTag

  # 모든 외부 트래픽(0.0.0.0/0)을 IGW로 보내는 라우팅 규칙
  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  # Subnet 1에 Route Table을 연결합니다.
  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  # Subnet 2에 Route Table을 연결합니다.
  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  # ---------------------------------------------------------------------------
  # ALB Security Group - 인터넷에서 HTTP(80) 트래픽을 허용합니다.
  # ---------------------------------------------------------------------------
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP and HTTPS from internet to ALB
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP from anywhere
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS from anywhere
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-alb-sg'
        - Key: CreatedBy
          Value: !Ref CreatedByTag
        - Key: Step
          Value: !Ref StepTag
        - Key: Session
          Value: !Ref SessionTag

  # ---------------------------------------------------------------------------
  # EC2 Security Group - ALB에서 오는 AppPort 트래픽만 허용합니다.
  # SSH는 SSHAccessCidr에서 허용합니다.
  # ---------------------------------------------------------------------------
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow AppPort from ALB and SSH access
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref AppPort
          ToPort: !Ref AppPort
          SourceSecurityGroupId: !Ref ALBSecurityGroup
          Description: Application port from ALB only
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref SSHAccessCidr
          Description: SSH access
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-ec2-sg'
        - Key: CreatedBy
          Value: !Ref CreatedByTag
        - Key: Step
          Value: !Ref StepTag
        - Key: Session
          Value: !Ref SessionTag

  # ---------------------------------------------------------------------------
  # Target Group - ALB가 트래픽을 전달할 대상 그룹입니다.
  # Auto Scaling Group이 이 Target Group에 인스턴스를 자동 등록합니다.
  # Health Check 경로: /health/ (Nginx UserData에서 자동 생성)
  # ---------------------------------------------------------------------------
  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub '${ProjectName}-tg'
      Protocol: HTTP
      Port: !Ref AppPort
      VpcId: !Ref VPC
      TargetType: instance
      HealthCheckProtocol: HTTP
      HealthCheckPath: /health/
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 3
      UnhealthyThresholdCount: 2
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-tg'
        - Key: CreatedBy
          Value: !Ref CreatedByTag
        - Key: Step
          Value: !Ref StepTag
        - Key: Session
          Value: !Ref SessionTag

  # ---------------------------------------------------------------------------
  # Application Load Balancer - Internet-facing ALB입니다.
  # 2개 AZ(Public Subnet)에 걸쳐 배치됩니다.
  # ---------------------------------------------------------------------------
  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub '${ProjectName}-alb'
      Scheme: internet-facing
      Type: application
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-alb'
        - Key: CreatedBy
          Value: !Ref CreatedByTag
        - Key: Step
          Value: !Ref StepTag
        - Key: Session
          Value: !Ref SessionTag

  # ---------------------------------------------------------------------------
  # ALB Listener - HTTP:80으로 들어오는 요청을 Target Group으로 전달합니다.
  # ---------------------------------------------------------------------------
  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Protocol: HTTP
      Port: 80
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

# =============================================================================
# Outputs - 스택 생성 후 확인할 수 있는 주요 값입니다.
# Auto Scaling Group 생성 시 Target Group ARN, 서브넷 ID, SG ID가 필요합니다.
# =============================================================================
Outputs:
  VPCId:
    Description: VPC ID
    Value: !Ref VPC
    Export:
      Name: !Sub '${ProjectName}-vpc-id'

  PublicSubnet1Id:
    Description: Public Subnet 1 ID (AZ-a)
    Value: !Ref PublicSubnet1
    Export:
      Name: !Sub '${ProjectName}-public-subnet-1-id'

  PublicSubnet2Id:
    Description: Public Subnet 2 ID (AZ-c)
    Value: !Ref PublicSubnet2
    Export:
      Name: !Sub '${ProjectName}-public-subnet-2-id'

  PrivateSubnet1Id:
    Description: Private Subnet 1 ID (AZ-a)
    Value: !Ref PrivateSubnet1
    Export:
      Name: !Sub '${ProjectName}-private-subnet-1-id'

  PrivateSubnet2Id:
    Description: Private Subnet 2 ID (AZ-c)
    Value: !Ref PrivateSubnet2
    Export:
      Name: !Sub '${ProjectName}-private-subnet-2-id'

  ALBSecurityGroupId:
    Description: ALB Security Group ID
    Value: !Ref ALBSecurityGroup
    Export:
      Name: !Sub '${ProjectName}-alb-sg-id'

  EC2SecurityGroupId:
    Description: EC2 Security Group ID
    Value: !Ref EC2SecurityGroup
    Export:
      Name: !Sub '${ProjectName}-ec2-sg-id'

  TargetGroupArn:
    Description: Target Group ARN (use in Auto Scaling Group)
    Value: !Ref TargetGroup
    Export:
      Name: !Sub '${ProjectName}-tg-arn'

  ALBDNSName:
    Description: ALB DNS Name
    Value: !GetAtt ALB.DNSName

  AppPort:
    Description: Application listening port
    Value: !Ref AppPort
