AWSTemplateFormatVersion: '2010-09-09'
Description: 'ALB Lab Prerequisites - VPC, Public Subnets (2 AZ), IGW, EC2 Instance with Nginx'

Parameters:
  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Name of an existing EC2 Key Pair for SSH access

Resources:
  # VPC
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: alb-lab-vpc
        - Key: CreatedBy
          Value: cloudformation
        - Key: Step
          Value: step7
        - Key: Session
          Value: '7-1'

  # Internet Gateway
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: alb-lab-igw
        - Key: CreatedBy
          Value: cloudformation
        - Key: Step
          Value: step7
        - Key: Session
          Value: '7-1'

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  # Public Subnet 1 (AZ-a)
  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: alb-lab-public-subnet-1
        - Key: CreatedBy
          Value: cloudformation
        - Key: Step
          Value: step7
        - Key: Session
          Value: '7-1'

  # Public Subnet 2 (AZ-c)
  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [2, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: alb-lab-public-subnet-2
        - Key: CreatedBy
          Value: cloudformation
        - Key: Step
          Value: step7
        - Key: Session
          Value: '7-1'

  # Public Route Table
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: alb-lab-public-rt
        - Key: CreatedBy
          Value: cloudformation
        - Key: Step
          Value: step7
        - Key: Session
          Value: '7-1'

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  # EC2 Security Group
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EC2 instances in ALB lab
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: SSH
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: 0.0.0.0/0
          Description: Application port
      Tags:
        - Key: Name
          Value: alb-lab-ec2-sg
        - Key: CreatedBy
          Value: cloudformation
        - Key: Step
          Value: step7
        - Key: Session
          Value: '7-1'

  # EC2 Instance with Nginx
  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t2.micro
      ImageId: !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}'
      KeyName: !Ref KeyPairName
      SubnetId: !Ref PublicSubnet1
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum update -y
          yum install -y nginx
          systemctl start nginx
          systemctl enable nginx
          # Configure nginx to listen on port 8080
          sed -i 's/listen       80;/listen       8080;/' /etc/nginx/nginx.conf
          sed -i 's/listen       \[::]:80;/listen       [::]:8080;/' /etc/nginx/nginx.conf
          systemctl restart nginx
      Tags:
        - Key: Name
          Value: alb-lab-ec2
        - Key: CreatedBy
          Value: cloudformation
        - Key: Step
          Value: step7
        - Key: Session
          Value: '7-1'

Outputs:
  VPCId:
    Description: VPC ID
    Value: !Ref VPC
  PublicSubnet1Id:
    Description: Public Subnet 1 ID
    Value: !Ref PublicSubnet1
  PublicSubnet2Id:
    Description: Public Subnet 2 ID
    Value: !Ref PublicSubnet2
  EC2SecurityGroupId:
    Description: EC2 Security Group ID
    Value: !Ref EC2SecurityGroup
  EC2InstanceId:
    Description: EC2 Instance ID
    Value: !Ref EC2Instance
