AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Step 4-1 RDS Lab Prerequisites.
  Creates VPC, Public Subnet, Private Subnets (2 AZs), IGW, Route Tables, Security Groups.
  DB Subnet Group and RDS instance are created manually during the lab.

# =============================================================================
# Metadata - CloudFormation 콘솔에서 파라미터 입력 화면의 그룹과 순서를 지정
# =============================================================================
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: 'Required Settings (Check Before Create)'
        Parameters:
          - ProjectName
          - SSHAccessCidr
      - Label:
          default: 'Network CIDR (Keep Default)'
        Parameters:
          - VpcCidr
          - PublicSubnetACidr
          - PublicSubnetCCidr
          - PrivateSubnetACidr
          - PrivateSubnetCCidr
      - Label:
          default: 'Tags (Keep Default)'
        Parameters:
          - CreatedByTag
          - StepTag
          - SessionTag

# =============================================================================
# Parameters - 스택 생성 시 사용자 입력값
# =============================================================================
Parameters:
  ProjectName:
    Type: String
    Default: my
    Description: Resource name prefix (e.g. my -> my-vpc, my-ec2-sg)
    AllowedPattern: '[a-zA-Z][a-zA-Z0-9-]*'
    ConstraintDescription: Must start with a letter, only letters, numbers, and hyphens allowed
    MinLength: 1
    MaxLength: 20

  VpcCidr:
    Type: String
    Default: '10.0.0.0/16'
    Description: VPC CIDR block

  PublicSubnetACidr:
    Type: String
    Default: '10.0.1.0/24'
    Description: Public Subnet A CIDR (ap-northeast-2a)

  PublicSubnetCCidr:
    Type: String
    Default: '10.0.2.0/24'
    Description: Public Subnet C CIDR (ap-northeast-2c)

  PrivateSubnetACidr:
    Type: String
    Default: '10.0.11.0/24'
    Description: Private Subnet A CIDR (ap-northeast-2a)

  PrivateSubnetCCidr:
    Type: String
    Default: '10.0.12.0/24'
    Description: Private Subnet C CIDR (ap-northeast-2c)

  SSHAccessCidr:
    Type: String
    Default: '0.0.0.0/0'
    Description: SSH(22) access CIDR. Restrict to your IP recommended (e.g. 203.0.113.50/32)

  CreatedByTag:
    Type: String
    Default: cloudformation
    Description: CreatedBy tag value

  StepTag:
    Type: String
    Default: step4
    Description: Step tag value

  SessionTag:
    Type: String
    Default: '4-1'
    Description: Session tag value

# =============================================================================
# Resources - 생성할 AWS 리소스
# =============================================================================
Resources:
  # VPC
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-vpc'
        - Key: CreatedBy
          Value: !Ref CreatedByTag
        - Key: Step
          Value: !Ref StepTag
        - Key: Session
          Value: !Ref SessionTag

  # Internet Gateway
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-igw'
        - Key: CreatedBy
          Value: !Ref CreatedByTag
        - Key: Step
          Value: !Ref StepTag
        - Key: Session
          Value: !Ref SessionTag

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  # Public Subnet A (AZ-a)
  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnetACidr
      AvailabilityZone: ap-northeast-2a
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-public-subnet-a'
        - Key: CreatedBy
          Value: !Ref CreatedByTag
        - Key: Step
          Value: !Ref StepTag
        - Key: Session
          Value: !Ref SessionTag

  # Public Subnet C (AZ-c)
  PublicSubnetC:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnetCCidr
      AvailabilityZone: ap-northeast-2c
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-public-subnet-c'
        - Key: CreatedBy
          Value: !Ref CreatedByTag
        - Key: Step
          Value: !Ref StepTag
        - Key: Session
          Value: !Ref SessionTag

  # Private Subnet A (AZ-a)
  PrivateSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnetACidr
      AvailabilityZone: ap-northeast-2a
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-private-subnet-a'
        - Key: CreatedBy
          Value: !Ref CreatedByTag
        - Key: Step
          Value: !Ref StepTag
        - Key: Session
          Value: !Ref SessionTag

  # Private Subnet C (AZ-c)
  PrivateSubnetC:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnetCCidr
      AvailabilityZone: ap-northeast-2c
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-private-subnet-c'
        - Key: CreatedBy
          Value: !Ref CreatedByTag
        - Key: Step
          Value: !Ref StepTag
        - Key: Session
          Value: !Ref SessionTag

  # Public Route Table
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-public-rt'
        - Key: CreatedBy
          Value: !Ref CreatedByTag
        - Key: Step
          Value: !Ref StepTag
        - Key: Session
          Value: !Ref SessionTag

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetA
      RouteTableId: !Ref PublicRouteTable

  PublicSubnetCRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetC
      RouteTableId: !Ref PublicRouteTable

  # EC2 Security Group
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${ProjectName}-ec2-sg'
      GroupDescription: !Sub '${ProjectName} - Security group for EC2 instances'
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref SSHAccessCidr
          Description: SSH
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: '0.0.0.0/0'
          Description: HTTP
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: '0.0.0.0/0'
          Description: Spring Boot
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-ec2-sg'
        - Key: CreatedBy
          Value: !Ref CreatedByTag
        - Key: Step
          Value: !Ref StepTag
        - Key: Session
          Value: !Ref SessionTag

  # RDS Security Group
  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${ProjectName}-rds-sg'
      GroupDescription: !Sub '${ProjectName} - Security group for RDS instances'
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          SourceSecurityGroupId: !Ref EC2SecurityGroup
          Description: MySQL from EC2
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-rds-sg'
        - Key: CreatedBy
          Value: !Ref CreatedByTag
        - Key: Step
          Value: !Ref StepTag
        - Key: Session
          Value: !Ref SessionTag

# =============================================================================
# Outputs - 생성된 리소스 ID 출력
# =============================================================================
Outputs:
  VPCId:
    Description: VPC ID
    Value: !Ref VPC
    Export:
      Name: !Sub '${AWS::StackName}-VPCId'

  PublicSubnetAId:
    Description: Public Subnet A ID
    Value: !Ref PublicSubnetA
    Export:
      Name: !Sub '${AWS::StackName}-PublicSubnetAId'

  PublicSubnetCId:
    Description: Public Subnet C ID
    Value: !Ref PublicSubnetC
    Export:
      Name: !Sub '${AWS::StackName}-PublicSubnetCId'

  PrivateSubnetAId:
    Description: Private Subnet A ID
    Value: !Ref PrivateSubnetA
    Export:
      Name: !Sub '${AWS::StackName}-PrivateSubnetAId'

  PrivateSubnetCId:
    Description: Private Subnet C ID
    Value: !Ref PrivateSubnetC
    Export:
      Name: !Sub '${AWS::StackName}-PrivateSubnetCId'

  EC2SecurityGroupId:
    Description: EC2 Security Group ID
    Value: !Ref EC2SecurityGroup
    Export:
      Name: !Sub '${AWS::StackName}-EC2SecurityGroupId'

  RDSSecurityGroupId:
    Description: RDS Security Group ID
    Value: !Ref RDSSecurityGroup
    Export:
      Name: !Sub '${AWS::StackName}-RDSSecurityGroupId'
